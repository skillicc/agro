name: Test, Deploy & Verify

on:
  push:
    branches:
      - main

jobs:
  # ── ধাপ ১: PHPUnit Tests (লোকাল / CI) ───────────────────────────────────
  phpunit:
    name: PHPUnit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, sqlite3, pdo_sqlite
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Copy .env for testing
        run: |
          cp .env.example .env
          php artisan key:generate
          # SQLite in-memory for CI tests
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          echo "DB_DATABASE=:memory:" >> .env

      - name: Run PHPUnit
        run: php artisan test --stop-on-failure

  # ── ধাপ ২: Deploy (PHPUnit পাস হলে) ────────────────────────────────────
  deploy:
    name: Deploy to Live Server
    runs-on: ubuntu-latest
    needs: phpunit

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ${{ secrets.SERVER_PATH }}
            git stash --include-untracked || true
            git fetch origin main
            git reset --hard origin/main
            composer install --no-dev --optimize-autoloader --no-interaction
            rm -rf node_modules
            npm ci --production=false
            npm run build
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

  # ── ধাপ ৩: Playwright Smoke Tests (Deploy এর পর) ───────────────────────
  smoke-test:
    name: Live Smoke Tests (Playwright)
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Playwright smoke tests against live site
        env:
          TEST_ENV: live
        run: npx playwright test tests/e2e/smoke.spec.js --reporter=list

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
